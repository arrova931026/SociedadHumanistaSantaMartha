<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión — Sociedad Humanista Santa Martha</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    /* ══════════════════════════════════════
       PALETA
    ══════════════════════════════════════ */
    :root {
      --azul-principal: #3A8FC4;
      --azul-suave:     #EBF4FB;
      --azul-medio:     #2574A9;
      --gris-texto:     #3D3D3D;
      --gris-medio:     #7A8A99;
      --gris-borde:     #D9E2EA;
      --gris-fondo:     #F7F9FB;
      --blanco:         #FFFFFF;
      --sombra-card:    0 4px 24px rgba(0,0,0,0.06);
    }

    /* ══════════════════════════════════════
       BASE
    ══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--gris-fondo);
      color: var(--gris-texto);
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3, h4, h5 {
      font-family: 'Lora', serif;
      font-weight: 600;
    }

    /* ══════════════════════════════════════
       HEADER SIMPLE
    ══════════════════════════════════════ */
    .header-sh {
      background-color: var(--blanco);
      border-bottom: 1px solid var(--gris-borde);
      padding: 0.75rem 1.5rem;
      box-shadow: 0 1px 12px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .header-sh img {
      height: 42px;
    }

    .header-sh .brand-text {
      line-height: 1.2;
    }

    .header-sh .brand-text strong {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--gris-texto);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-sh .brand-text span {
      font-size: 0.72rem;
      color: var(--gris-medio);
    }

    /* ══════════════════════════════════════
       HERO FONDO (igual que index)
    ══════════════════════════════════════ */
    .login-hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      background-image: url('Index.png');
      background-size: cover;
      background-position: center -110px;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    @media (max-width: 768px) {
      .login-hero {
        background-attachment: scroll;
        background-position: center top;
      }
    }

    /* ══════════════════════════════════════
       CARD DE LOGIN
    ══════════════════════════════════════ */
    .login-card {
      background: var(--blanco);
      border-radius: 16px;
      padding: 44px 48px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      border-top: 3px solid var(--azul-principal);
      width: 100%;
      max-width: 420px;
    }

    .login-logo-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: var(--azul-suave);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      padding: 12px;
      border: 2px solid var(--gris-borde);
    }

    .login-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .login-card h2 {
      font-size: 1.2rem;
      color: var(--gris-texto);
      text-align: center;
      margin-bottom: 4px;
    }

    .login-card .subtitulo {
      font-size: 0.82rem;
      color: var(--gris-medio);
      text-align: center;
      margin-bottom: 28px;
    }

    /* ══════════════════════════════════════
       INPUTS
    ══════════════════════════════════════ */
    .form-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--gris-texto);
      margin-bottom: 5px;
    }

    .form-control {
      border: 1px solid var(--gris-borde);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      color: var(--gris-texto);
      background-color: var(--blanco);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      border-color: var(--azul-principal);
      box-shadow: 0 0 0 3px rgba(58,143,196,0.15);
      outline: none;
    }

    .form-control::placeholder {
      color: var(--gris-medio);
      font-size: 0.88rem;
    }

    .input-group .form-control {
      border-right: none;
      border-radius: 8px 0 0 8px;
    }

    .input-group .btn-toggle-pass {
      border: 1px solid var(--gris-borde);
      border-left: none;
      border-radius: 0 8px 8px 0;
      background: var(--blanco);
      color: var(--gris-medio);
      padding: 0 14px;
      transition: color 0.2s;
    }

    .input-group .btn-toggle-pass:hover {
      color: var(--azul-principal);
    }

    .input-group .form-control:focus {
      border-right: none;
    }

    /* ══════════════════════════════════════
       ENLACE OLVIDÉ CONTRASEÑA
    ══════════════════════════════════════ */
    .link-olvide {
      font-size: 0.8rem;
      color: var(--azul-principal);
      text-decoration: none;
      display: block;
      text-align: right;
      margin-top: 6px;
    }

    .link-olvide:hover {
      text-decoration: underline;
    }

    /* ══════════════════════════════════════
       DIVISOR
    ══════════════════════════════════════ */
    .divisor-social {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 24px 0 20px;
      color: var(--gris-medio);
      font-size: 0.78rem;
    }

    .divisor-social::before,
    .divisor-social::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: var(--gris-borde);
    }

    /* ══════════════════════════════════════
       BOTONES SOCIALES
    ══════════════════════════════════════ */
    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      border-radius: 50px;
      border: 1px solid var(--gris-borde);
      background: var(--blanco);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--gris-texto);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .btn-social:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-color: #bbb;
      background: var(--gris-fondo);
    }

    .btn-social.facebook {
      color: #1877F2;
      border-color: #1877F2;
    }

    .btn-social.facebook:hover {
      background: #f0f5ff;
    }

    .social-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ══════════════════════════════════════
       BOTÓN INGRESAR
    ══════════════════════════════════════ */
    .btn-ingresar {
      width: 100%;
      background-color: var(--azul-principal);
      color: var(--blanco);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px;
      border: none;
      border-radius: 50px;
      letter-spacing: 0.4px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(58,143,196,0.35);
      margin-top: 24px;
      cursor: pointer;
    }

    .btn-ingresar:hover {
      background-color: var(--azul-medio);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(58,143,196,0.45);
    }

    /* ══════════════════════════════════════
       FOOTER MÍNIMO
    ══════════════════════════════════════ */
    .footer-min {
      background-color: var(--blanco);
      border-top: 1px solid var(--gris-borde);
      padding: 14px 20px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--gris-medio);
    }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
      }
    }

    @media (max-width: 576px) {
      .header-sh .brand-text { display: none; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <a class="header-sh" href="index.html">
    <img src="logo.png" alt="Logo Sociedad Humanista Santa Martha"/>
    <div class="brand-text">
      <strong>Sociedad Humanista</strong>
      <span>Santa Martha S.A. de C.V.</span>
    </div>
  </a>

  <!-- FONDO CON IMAGEN + CARD -->
  <div class="login-hero">
    <div class="login-card">

      <div class="login-logo-wrap">
        <img src="logo.png" alt="Logo"/>
      </div>

      <h2>Bienvenido de regreso</h2>
      <p class="subtitulo">Ingrese sus credenciales para acceder a su portal</p>

      <form action="https://arrova931026.github.io/SociedadHumanistaSantaMartha/site.html" method="post" novalidate>

        <!-- Usuario / Número de contrato -->
        <div class="mb-3">
          <label for="usuario" class="form-label">
            <i class="bi bi-person me-1"></i>Número de contrato o usuario
          </label>
          <input
            type="text"
            class="form-control"
            id="usuario"
            name="usuario"
            placeholder="Ej. 00123456"
            autocomplete="username"
            required
          />
        </div>

        <!-- Contraseña -->
        <div class="mb-1">
          <label for="password" class="form-label">
            <i class="bi bi-lock me-1"></i>Contraseña
          </label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="btn-toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <a href="#" class="link-olvide">¿Olvidó su contraseña?</a>

        <button type="submit" class="btn-ingresar">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>

      </form>

      <!-- DIVISOR -->
      <div class="divisor-social">o continúa con</div>

      <!-- BOTONES SOCIALES -->
      <div class="social-row">
        <button type="button" class="btn-social google">
          <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.08-6.08C34.36 3.05 29.47 1 24 1 14.82 1 7.07 6.48 3.72 14.22l7.08 5.5C12.56 13.32 17.82 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.67c-.55 2.96-2.2 5.47-4.67 7.16l7.18 5.57C43.44 37.28 46.52 31.36 46.52 24.5z"/>
            <path fill="#FBBC05" d="M10.8 28.28A14.57 14.57 0 0 1 9.5 24c0-1.49.26-2.93.72-4.28l-7.08-5.5A23.93 23.93 0 0 0 0 24c0 3.87.93 7.53 2.58 10.76l8.22-6.48z"/>
            <path fill="#34A853" d="M24 47c5.47 0 10.06-1.81 13.42-4.93l-7.18-5.57c-1.82 1.22-4.15 1.95-6.24 1.95-6.18 0-11.44-3.82-13.2-9.17l-8.22 6.48C7.07 41.52 14.82 47 24 47z"/>
          </svg>
          Continuar con Google
        </button>

        <button type="button" class="btn-social facebook">
          <i class="bi bi-facebook" style="font-size:1.1rem;"></i>
          Continuar con Facebook
        </button>
      </div>

      <!-- REGISTRO -->
      <div style="text-align:center; margin-top:22px; padding-top:18px; border-top:1px solid var(--gris-borde);">
        <span style="font-size:0.82rem; color:var(--gris-medio);">¿Aún no tiene una cuenta?</span>
        <a href="registrarUsuario.html"
           style="display:inline-flex; align-items:center; gap:6px; margin-top:8px;
                  width:100%; justify-content:center; padding:10px;
                  border:1.5px solid var(--azul-principal); border-radius:50px;
                  font-size:0.88rem; font-weight:600; color:var(--azul-principal);
                  text-decoration:none; transition:background 0.2s;"
           onmouseover="this.style.background='var(--azul-suave)'"
           onmouseout="this.style.background='transparent'">
          <i class="bi bi-person-plus"></i> Registrar nuevo usuario
        </a>
      </div>

    </div>
  </div>

  <!-- FOOTER MÍNIMO -->
  <footer class="footer-min">
    © 2026 Sociedad Humanista Santa Martha S.A. de C.V. — Todos los derechos reservados.
  </footer>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Mostrar / ocultar contraseña
    document.getElementById('togglePass').addEventListener('click', function () {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    });
  </script>

</body>
</html>
